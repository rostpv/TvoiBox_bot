name: ${COMPOSE_PROJECT_NAME:-tvoy-box-local}

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tvoy_box
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Europe/Moscow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

volumes:
  postgres-data:
    name: ${COMPOSE_PROJECT_NAME:-tvoy-box-local}_postgres_data
